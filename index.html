<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lifetime Tree Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Lifetime Forest</h1>
        <p class="subtitle">Tracking every sapling, every year.</p>
    </header>

    <main>
        <section class="dashboard">
            <div class="stat-card">
                <h3>Total Trees</h3>
                <p id="index-total-trees">0</p>
            </div>
            <div class="stat-card">
                <h3>CO₂ Captured</h3>
                <p><span id="index-total-co2">0</span> <span class="unit">kg</span></p>
            </div>
            <div class="stat-card">
                <h3>Green Cover</h3>
                <p><span id="index-green-cover">0</span> <span class="unit">sq m</span></p>
            </div>
        </section>

        <section class="road-container" id="road-container">
            <div class="milestone-wrap"><a href="overall-forest.html" class="milestone forest-milestone">Overall Forest</a></div>
        </section>
    </main>

    <script src="utils.js"></script>
    <script src="data.js"></script>
    <script>
        const currentYear = new Date().getFullYear();

        const localTrees = getLocalTrees();
        const combinedData = [...allTreeData, ...localTrees];

        let totalTrees = 0;
        let totalCO2 = 0;
        let totalGreenCover = 0;

        combinedData.forEach(tree => {
            const impact = getTreeImpact(tree, currentYear);
            if (impact.yearsActive > 0 || tree.age >= 0) {
                totalTrees += (tree.count || 0);
            }
            totalCO2 += impact.co2Captured;
            totalGreenCover += impact.greenCover;
        });

        document.getElementById('index-total-trees').textContent = totalTrees.toLocaleString();
        document.getElementById('index-total-co2').textContent = totalCO2.toLocaleString();
        document.getElementById('index-green-cover').textContent = totalGreenCover.toLocaleString();

        // Build year timeline dynamically; highlight the current year
        const years = [...new Set([currentYear, ...combinedData.filter(t => t.year).map(t => t.year)])]
            .sort((a, b) => b - a);
            
        const roadContainer = document.getElementById('road-container');
        roadContainer.innerHTML = `
            <svg id="svg-road" class="svg-road" preserveAspectRatio="none">
                <path id="svg-path" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3" stroke-dasharray="10 8" stroke-linecap="round"/>
            </svg>
        `;
        
        const treeSVGs = [
            // Pine with Trunk
            `<g>
                <path fill="#795548" d="M11 18h2v6h-2z"/>
                <path fill="#81c784" d="M12 2L4 12h3l-3 8h16l-3-8h3z"/>
            </g>`, 
            // Broadleaf with Trunk
            `<g>
                <path fill="#795548" d="M11 15h2v9h-2z"/>
                <path fill="#81c784" d="M17 10a5 5 0 0 0-10 0c-1.7 0-3 1.3-3 3 0 1.4 1 2.6 2.3 2.9v.1h13.4v-.1c1.3-.3 2.3-1.5 2.3-2.9 0-1.7-1.3-3-3-3z"/>
            </g>`
        ];

        let milestonesData = [];
        const minYear = years.length ? Math.min(...years) : currentYear;
        
        function addMilestone(year, isOverall) {
            const isCurrent = year === currentYear && !isOverall;
            const row = document.createElement('div');
            row.className = 'milestone-row';
            if (isOverall) {
                row.style.minHeight = '100px'; 
            }

            const isOdd = milestonesData.length % 2 !== 0;
            const jitterLeft = Math.random() * 40 - 20; 
            
            row.style.justifyContent = isOdd ? 'flex-start' : 'flex-end';
            row.style.paddingLeft = isOdd ? `calc(50% - 90px + ${jitterLeft}px)` : '0';
            row.style.paddingRight = !isOdd ? `calc(50% - 90px + ${jitterLeft}px)` : '0';

            const ageSpan = isOverall ? 6 : Math.max(1, (year - minYear) + 1);
            // Drastically lower tree count, bigger trees for a less messy look
            const numTrees = isOverall ? 14 : Math.min(10, ageSpan * 2);

            let treesHtml = '';
            for(let i=0; i < numTrees; i++) {
                const path = treeSVGs[Math.floor(Math.random() * treeSVGs.length)];
                
                // Flanking distribution (left/right bands) instead of overlapping radial
                const side = Math.random() > 0.5 ? 1 : -1;
                
                const baseWidth = isOverall ? 75 : 45; // Ensure we clear the button width
                const spreadX = 10 + (ageSpan * 8);
                const tx = side * (baseWidth + Math.random() * spreadX);
                
                // Spread vertically up and down the road
                const spreadY = isOverall ? 60 : 100; 
                const ty = (Math.random() * spreadY) - (spreadY / 2);
                
                const scale = 0.8 + Math.random() * 0.4;
                const opacity = 0.8 + Math.random() * 0.2; 
                
                treesHtml += `<svg style="transform: translate(${tx}px, ${ty}px) scale(${scale}); opacity:${opacity};" viewBox="0 0 24 24" class="vector-tree">${path}</svg>`;
            }

            const linkHtml = isOverall 
                ? `<a href="overall-forest.html" class="milestone forest-milestone">Overall Forest</a>`
                : `<a href="forest.html?year=${year}" class="milestone ${isCurrent ? 'current-year' : ''}">${year}</a>`;

            row.innerHTML = `
                <div class="milestone-wrap ${isCurrent ? 'current-wrap' : ''}">
                    <div class="halo-decor">${treesHtml}</div>
                    ${linkHtml}
                </div>
            `;
            roadContainer.appendChild(row);
            milestonesData.push(row);
        }

        addMilestone(null, true);
        years.forEach(y => addMilestone(y, false));

        function drawCurve() {
            const pathNode = document.getElementById('svg-path');
            const wraps = document.querySelectorAll('.milestone-wrap');
            if (wraps.length < 2) return;

            const containerRect = roadContainer.getBoundingClientRect();
            
            let d = '';
            for(let i=0; i < wraps.length; i++) {
                const wrap = wraps[i];
                const rect = wrap.getBoundingClientRect();
                const x = rect.left + rect.width / 2 - containerRect.left;
                const y = rect.top + rect.height / 2 - containerRect.top;

                if (i === 0) {
                    d += `M ${x} ${y}`;
                } else {
                    const prevRect = wraps[i-1].getBoundingClientRect();
                    const px = prevRect.left + prevRect.width / 2 - containerRect.left;
                    const py = prevRect.top + prevRect.height / 2 - containerRect.top;

                    // Organic bezier wobble
                    const wobbleSize = 60;
                    const c1x = px + (Math.random() * wobbleSize - wobbleSize/2);
                    const c1y = py + (y - py) * 0.6;
                    const c2x = x + (Math.random() * wobbleSize - wobbleSize/2);
                    const c2y = y - (y - py) * 0.6;
                    
                    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x} ${y}`;
                }
            }
            pathNode.setAttribute('d', d);
        }

        setTimeout(drawCurve, 50);
        window.addEventListener('resize', drawCurve);
    </script>
</body>
</html>
