<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overall Lifetime Forest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="nav-back">← Timeline</a>
    </nav>

    <header>
        <h1 class="page-title">Lifetime Forest</h1>
        <p class="subtitle page-subtitle">Your complete forest, to date.</p>
    </header>

    <main>
        <section class="dashboard">
            <div class="stat-card compact">
                <h3>Total Trees</h3>
                <p id="total-trees">0</p>
            </div>
            <div class="stat-card compact">
                <h3>CO₂ Captured</h3>
                <p><span id="total-co2">0</span> <span class="unit">kg</span></p>
            </div>
            <div class="stat-card compact">
                <h3>Green Cover</h3>
                <p><span id="total-cover">0</span> <span class="unit">m²</span></p>
            </div>
        </section>

        <section class="content-split">
            <div class="tree-list-container" id="list-container">
                <div class="list-header">
                    <h3>All Saplings</h3>
                    <span class="list-count-badge" id="list-count">0</span>
                </div>
                <div id="tree-list"></div>
            </div>
            <div id="map">
                <button class="locate-btn" id="locate-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
                    Find My Location
                </button>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="utils.js"></script>
    <script src="data.js"></script>
    <script>
        const map = initForestMap('map', [28.4595, 77.0266], 13);
        const markers = {};
        const listContainer = document.getElementById('tree-list');
        const currentYear = new Date().getFullYear();

        const localTrees = getLocalTrees();
        const localTreeIds = new Set(localTrees.map(t => t.id));
        const combinedData = [...allTreeData, ...localTrees];

        let totalTreeCount = 0;
        let totalCO2 = 0;
        let totalGreenCover = 0;
        let cardCount = 0;

        function updateDashboard() {
            document.getElementById('total-trees').textContent = totalTreeCount.toLocaleString();
            document.getElementById('total-co2').textContent = totalCO2.toLocaleString();
            document.getElementById('total-cover').textContent = totalGreenCover.toLocaleString();
            document.getElementById('list-count').textContent = cardCount;
        }

        function renderTree(tree, isLocal) {
            const impact = getTreeImpact(tree, currentYear);
            if (!tree.count || !tree.year || tree.age == null) return;

            cardCount += 1;
            totalTreeCount += tree.count;
            totalCO2 += impact.co2Captured;
            totalGreenCover += impact.greenCover;

            const iconSizePx = 16 + (tree.age * 4);
            const treeIcon = L.divIcon({
                className: 'custom-tree-icon',
                html: `<div style="font-size:${iconSizePx}px; line-height:1; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4));">🌳</div>`,
                iconSize: [iconSizePx, iconSizePx],
                iconAnchor: [iconSizePx / 2, iconSizePx]
            });

            const marker = L.marker([tree.lat, tree.lng], { icon: treeIcon }).addTo(map);
            const safeType = escapeHTML(tree.type);
            marker.bindPopup(`<b>${safeType}</b><br><span>Count: ${tree.count} · Planted: ${tree.year}</span>`);
            markers[tree.id] = marker;

            const card = document.createElement('div');
            card.className = 'sleek-card';

            const headerDiv = document.createElement('div');
            headerDiv.className = 'card-header';
            const strong = document.createElement('strong');
            strong.textContent = tree.type;
            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = `${tree.count} trees`;
            headerDiv.appendChild(strong);
            headerDiv.appendChild(badge);

            const statsDiv = document.createElement('div');
            statsDiv.className = 'card-stats';
            statsDiv.innerHTML = `
                <div><span>Planted</span><span>${escapeHTML(tree.month)} ${tree.year}</span></div>
                <div><span>Now Growing</span><span>${impact.yearsActive} yr${impact.yearsActive !== 1 ? 's' : ''}</span></div>
                <div><span>CO₂ Captured</span><span>${impact.co2Captured.toLocaleString()} kg</span></div>
                <div><span>Green Cover</span><span>${impact.greenCover.toLocaleString()} m²</span></div>
            `;

            card.appendChild(headerDiv);
            card.appendChild(statsDiv);

            if (isLocal) {
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.title = 'Remove';
                delBtn.textContent = '✕';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    saveLocalTrees(getLocalTrees().filter(t => t.id !== tree.id));
                    map.removeLayer(markers[tree.id]);
                    delete markers[tree.id];
                    totalTreeCount -= tree.count;
                    totalCO2 -= impact.co2Captured;
                    totalGreenCover -= impact.greenCover;
                    cardCount -= 1;
                    card.remove();
                    updateDashboard();
                    if (Object.keys(markers).length > 0) {
                        map.flyToBounds(new L.featureGroup(Object.values(markers)).getBounds(), { padding: [50, 50], duration: 1.2 });
                    }
                });
                card.appendChild(delBtn);
            }

            card.addEventListener('click', () => {
                map.flyTo([tree.lat, tree.lng], 16, { duration: 1.2 });
                markers[tree.id].openPopup();
            });

            listContainer.appendChild(card);
        }

        combinedData.forEach(tree => renderTree(tree, localTreeIds.has(tree.id)));
        updateDashboard();

        if (Object.keys(markers).length > 0) {
            map.fitBounds(new L.featureGroup(Object.values(markers)).getBounds(), { padding: [50, 50] });
        } else if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => map.setView([pos.coords.latitude, pos.coords.longitude], 13),
                () => {}
            );
        }

        document.getElementById('locate-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const { latitude: lat, longitude: lng } = position.coords;
                    map.flyTo([lat, lng], 15);
                    L.popup()
                        .setLatLng([lat, lng])
                        .setContent("<b style='color:#111;'>You are here</b><br><span style='color:#555; font-size:0.85em;'>Your current location.</span>")
                        .openOn(map);
                }, () => {
                    console.warn('Location access denied.');
                });
            }
        });

    </script>
</body>
</html>
