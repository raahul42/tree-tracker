<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yearly Forest & Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        body {
            background: linear-gradient(rgba(8, 20, 10, 0.72), rgba(8, 20, 10, 0.88)),
                        url('https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=2560&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0 20px 60px;
            color: #fff;
            animation: fadeIn 0.35s ease;
        }

        /* Top nav */
        .top-nav {
            display: flex;
            align-items: center;
            padding: 20px 0 0 0;
            margin-bottom: 24px;
        }

        .nav-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.55);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 7px 14px;
            border-radius: 100px;
            transition: all 0.2s;
        }
        .nav-back:hover {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.9);
            border-color: rgba(255,255,255,0.2);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: -0.3px;
            margin: 0 0 6px 0;
            color: #fff;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.875rem;
            font-weight: 400;
            margin-bottom: 32px;
        }

        /* Stats */
        .dashboard {
            display: flex;
            justify-content: center;
            max-width: 700px;
            margin: 0 auto 28px auto;
            gap: 12px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 18px 28px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex: 1;
        }

        .stat-card h3 {
            margin: 0 0 8px 0;
            font-size: 0.68rem;
            font-weight: 500;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .stat-card p {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 300;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .stat-card p .unit {
            font-size: 0.85rem;
            font-weight: 400;
            color: rgba(255,255,255,0.45);
            letter-spacing: 0;
        }

        /* Layout */
        .content-split {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            gap: 16px;
            height: 520px;
        }

        /* Tree list */
        .tree-list-container {
            flex: 1;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 16px;
            padding: 20px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .list-header h3 {
            margin: 0;
            font-size: 0.75rem;
            font-weight: 500;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .list-count-badge {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            font-weight: 500;
            padding: 2px 9px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tree-card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-left: 2px solid rgba(255,255,255,0.15);
            padding: 14px 16px;
            margin-bottom: 10px;
            border-radius: 0 10px 10px 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tree-card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: rgba(255,255,255,0.5);
            transform: translateX(4px);
        }

        .tree-card strong {
            display: block;
            font-size: 0.95rem;
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
        }

        .tree-card span {
            display: block;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 2px;
        }

        .delete-btn {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.65rem;
            opacity: 0;
            transition: all 0.2s;
            padding: 0;
            line-height: 1;
        }

        .tree-card:hover .delete-btn { opacity: 1; }

        .delete-btn:hover {
            background: rgba(220, 50, 50, 0.25);
            border-color: rgba(220, 50, 50, 0.4);
            color: #ff7f7f;
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: calc(100% - 48px);
            gap: 10px;
            text-align: center;
        }

        .empty-state .empty-icon {
            font-size: 2rem;
            opacity: 0.4;
        }

        .empty-state p {
            margin: 0;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.3);
            font-weight: 400;
            line-height: 1.5;
        }

        /* Map */
        #map {
            flex: 2;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.07);
            position: relative;
            cursor: crosshair;
        }

        .custom-tree-icon { background: none; border: none; }

        /* Leaflet popups */
        .leaflet-popup-content-wrapper {
            background: rgba(255,255,255,0.97);
            border-radius: 12px;
            border: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .leaflet-popup-tip { background: rgba(255,255,255,0.97); }

        /* Plant form */
        .glass-form { font-family: 'Inter', sans-serif; padding: 4px 0; }
        .glass-form h4 { margin: 0 0 14px 0; color: #111; font-size: 0.9rem; font-weight: 600; }

        .form-field { margin-bottom: 10px; }
        .form-field label { display: block; font-size: 0.7rem; font-weight: 500; color: #666; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
        .form-field input {
            width: 100%; padding: 9px 12px;
            border: 1px solid #e0e0e0; border-radius: 8px;
            font-family: 'Inter', sans-serif; font-size: 0.875rem; color: #111;
            outline: none; transition: border-color 0.2s;
        }
        .form-field input:focus { border-color: #aaa; }

        .form-error {
            font-size: 0.75rem;
            color: #c0392b;
            margin-bottom: 10px;
            display: none;
            font-weight: 500;
        }
        .form-error.visible { display: block; }

        .glass-form button {
            width: 100%; padding: 10px;
            background: #111; color: #fff;
            border: none; border-radius: 8px;
            cursor: pointer; font-family: 'Inter', sans-serif;
            font-weight: 500; font-size: 0.875rem;
            transition: background 0.2s;
            margin-top: 4px;
        }
        .glass-form button:hover { background: #333; }

        /* Locate button */
        .locate-btn {
            position: absolute; bottom: 16px; right: 16px; z-index: 1000;
            background: rgba(255,255,255,0.95);
            padding: 10px 18px; border-radius: 100px;
            border: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 500; font-size: 0.8rem;
            color: #111;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            transition: all 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .locate-btn:hover { background: #fff; transform: scale(1.03); }
        .locate-btn svg { width: 14px; height: 14px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="nav-back">← Timeline</a>
    </div>

    <h1 id="page-title">Forest Map</h1>
    <p class="subtitle" id="page-subtitle"></p>

    <div class="dashboard">
        <div class="stat-card">
            <h3>Trees This Year</h3>
            <p id="yearly-trees">0</p>
        </div>
        <div class="stat-card">
            <h3>Green Cover</h3>
            <p><span id="yearly-cover">0</span> <span class="unit">sq m</span></p>
        </div>
    </div>

    <div class="content-split">
        <div class="tree-list-container" id="list-container">
            <div class="list-header">
                <h3>Saplings Planted</h3>
                <span class="list-count-badge" id="list-count">0</span>
            </div>
            <div id="tree-list"></div>
        </div>
        <div id="map">
            <button class="locate-btn" id="locate-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
                Find My Location
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="utils.js"></script>
    <script src="data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const yearParam = parseInt(urlParams.get('year')) || new Date().getFullYear();
        document.getElementById('page-title').textContent = `${yearParam} Forest`;

        const baseMaps = createMapLayers();
        const savedMapStyle = localStorage.getItem('preferredMapStyle') || 'Minimal Light';

        const map = L.map('map', { center: [28.4595, 77.0266], zoom: 13, layers: [baseMaps[savedMapStyle] || baseMaps['Minimal Light']] });
        L.control.layers(baseMaps).addTo(map);
        map.on('baselayerchange', e => localStorage.setItem('preferredMapStyle', e.name));

        const localTrees = getLocalTrees();
        const localTreeIds = new Set(localTrees.map(t => t.id));
        const combinedData = [...allTreeData, ...localTrees];
        const yearData = combinedData.filter(tree => tree.year === yearParam);

        let totalTrees = 0;
        let cardCount = 0;
        const markers = {};
        const listContainer = document.getElementById('tree-list');

        function updateDashboard() {
            document.getElementById('yearly-trees').textContent = totalTrees.toLocaleString();
            document.getElementById('yearly-cover').textContent = (totalTrees * 4).toLocaleString();
            document.getElementById('list-count').textContent = cardCount;
        }

        function renderTree(tree, isLocal) {
            totalTrees += tree.count;
            cardCount += 1;

            const iconSizePx = 20 + (tree.age * 4);
            const treeIcon = L.divIcon({
                className: 'custom-tree-icon',
                html: `<div style="font-size:${iconSizePx}px; line-height:1; filter:drop-shadow(0 2px 3px rgba(0,0,0,0.35));">🌳</div>`,
                iconSize: [iconSizePx, iconSizePx],
                iconAnchor: [iconSizePx / 2, iconSizePx]
            });

            const marker = L.marker([tree.lat, tree.lng], { icon: treeIcon }).addTo(map);
            marker.bindPopup(`<b style="color:#111;">${tree.type}</b><br><span style="color:#555;">Count: ${tree.count}</span>`);
            markers[tree.id] = marker;

            const card = document.createElement('div');
            card.className = 'tree-card';

            const strong = document.createElement('strong');
            strong.textContent = `${tree.type} · ${tree.count}`;
            const span = document.createElement('span');
            span.textContent = `${tree.month} — ${tree.age} yr sapling`;
            card.appendChild(strong);
            card.appendChild(span);

            if (isLocal) {
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.title = 'Remove';
                delBtn.textContent = '✕';
                delBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    saveLocalTrees(getLocalTrees().filter(t => t.id !== tree.id));
                    map.removeLayer(markers[tree.id]);
                    delete markers[tree.id];
                    totalTrees -= tree.count;
                    cardCount -= 1;
                    card.remove();
                    updateDashboard();
                    if (cardCount === 0) {
                        listContainer.innerHTML = '';
                        listContainer.appendChild(emptyStateEl());
                    } else if (Object.keys(markers).length > 0) {
                        map.flyToBounds(new L.featureGroup(Object.values(markers)).getBounds(), { padding: [50, 50], duration: 1.2 });
                    }
                });
                card.appendChild(delBtn);
            }

            card.addEventListener('click', () => {
                map.flyTo([tree.lat, tree.lng], 16, { duration: 1.2 });
                markers[tree.id].openPopup();
            });

            listContainer.appendChild(card);
        }

        function emptyStateEl() {
            const div = document.createElement('div');
            div.className = 'empty-state';
            div.innerHTML = `<div class="empty-icon">🌱</div><p>No saplings logged for ${yearParam}.<br>Click anywhere on the map to add one.</p>`;
            return div;
        }

        yearData.forEach(tree => renderTree(tree, localTreeIds.has(tree.id)));
        updateDashboard();

        if (yearData.length === 0) {
            listContainer.appendChild(emptyStateEl());
            // Show hint subtitle only when there's nothing here yet
            document.getElementById('page-subtitle').textContent = 'Click anywhere on the map to log your first sapling.';
        }

        if (Object.keys(markers).length > 0) {
            map.fitBounds(new L.featureGroup(Object.values(markers)).getBounds(), { padding: [50, 50] });
        } else if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => map.setView([pos.coords.latitude, pos.coords.longitude], 13),
                () => {}
            );
        }

        map.on('click', function(e) {
            const formHtml = `
                <div class="glass-form">
                    <h4>Log a Sapling</h4>
                    <div class="form-error" id="plant-error">Please fill in tree type and count.</div>
                    <div class="form-field">
                        <label>Tree Type</label>
                        <input type="text" id="new-type" placeholder="e.g. Mango">
                    </div>
                    <div class="form-field">
                        <label>Number of Trees</label>
                        <input type="number" id="new-count" placeholder="e.g. 5" min="1">
                    </div>
                    <div class="form-field">
                        <label>Sapling Age (years)</label>
                        <input type="number" id="new-age" placeholder="e.g. 1" min="0">
                    </div>
                    <button id="plant-btn" data-lat="${e.latlng.lat}" data-lng="${e.latlng.lng}">Plant Here 🌱</button>
                </div>
            `;
            L.popup({ minWidth: 220 }).setLatLng(e.latlng).setContent(formHtml).openOn(map);
        });

        map.on('popupopen', function() {
            const btn = document.getElementById('plant-btn');
            if (!btn) return;
            btn.addEventListener('click', function() {
                saveNewTree(parseFloat(this.dataset.lat), parseFloat(this.dataset.lng));
            });
        });

        function saveNewTree(lat, lng) {
            const type = document.getElementById('new-type').value.trim();
            const count = parseInt(document.getElementById('new-count').value);
            const age = parseInt(document.getElementById('new-age').value);
            const errorEl = document.getElementById('plant-error');

            if (!type || !count) {
                errorEl.classList.add('visible');
                return;
            }
            errorEl.classList.remove('visible');

            const newTree = {
                id: Date.now(),
                lat, lng, type, count, age: age || 0,
                month: new Date().toLocaleString('default', { month: 'long' }),
                year: yearParam
            };

            const savedData = getLocalTrees();
            savedData.push(newTree);
            saveLocalTrees(savedData);
            map.closePopup();

            const emptyState = listContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();
            document.getElementById('page-subtitle').textContent = '';

            renderTree(newTree, true);
            updateDashboard();
        }

        document.getElementById('locate-btn').addEventListener('click', function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(position => {
                    const { latitude: lat, longitude: lng } = position.coords;
                    map.flyTo([lat, lng], 15);
                    L.popup()
                        .setLatLng([lat, lng])
                        .setContent("<b style='color:#111;'>You are here</b><br><span style='color:#555; font-size:0.85em;'>Click nearby to log a sapling.</span>")
                        .openOn(map);
                }, () => {
                    console.warn('Location access denied.');
                });
            }
        });

    </script>
</body>
</html>
